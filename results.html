<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Results — Baby Cheema Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #F4EFE3;
    --pitch-line: #E2D9C3;
    --ink: #1C2230;
    --ink-soft: #565F70;
    --pink: #E8839F;
    --blue: #5C8FB8;
    --gold: #BF9B30;
    --cream-card: #FFFDF8;
    --shadow: 0 1px 2px rgba(28,34,48,0.04), 0 8px 24px rgba(28,34,48,0.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--pitch);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    padding: 24px 18px 60px;
  }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.7rem;
    margin: 8px 0 4px;
  }
  .sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }
  .summary {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    flex: 1;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    background: var(--cream-card);
    box-shadow: var(--shadow);
    padding: 16px;
    text-align: center;
  }
  .summary-card .n {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 600;
  }
  .summary-card.pink .n { color: var(--pink); }
  .summary-card.blue .n { color: var(--blue); }
  .summary-card .l {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    background: var(--cream-card);
    box-shadow: var(--shadow);
  }
  th, td {
    text-align: left;
    padding: 10px 14px;
    font-size: 14px;
    border-bottom: 1px solid var(--pitch-line);
  }
  th {
    background: var(--ink);
    color: var(--pitch);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag.pink { background: #FBE3EA; color: #A14463; }
  .tag.blue { background: #E2EDF5; color: #2C597D; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .refresh {
    margin-top: 18px;
    text-align: center;
  }
  .refresh button {
    border: 1.5px solid var(--ink);
    background: var(--cream-card);
    border-radius: 4px;
    padding: 9px 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Who guessed what</h1>
  <p class="sub">Private results — not linked from the main page.</p>

  <div class="summary">
    <div class="summary-card pink">
      <div class="n" id="pinkCount">—</div>
      <div class="l">Girl</div>
    </div>
    <div class="summary-card blue">
      <div class="n" id="blueCount">—</div>
      <div class="l">Boy</div>
    </div>
  </div>

  <div id="tableWrap"></div>

  <div class="refresh"><button onclick="load()">Refresh</button></div>
</div>

<script>
  async function load() {
    const tableWrap = document.getElementById('tableWrap');
    try {
      const res = await fetch('/api/vote');
      const data = await res.json();

      document.getElementById('pinkCount').textContent = data.pink || 0;
      document.getElementById('blueCount').textContent = data.blue || 0;

      const entries = (data.entries || []).slice().reverse();

      if (!entries.length) {
        tableWrap.innerHTML = '<div class="empty">No guesses yet — once people start guessing, they\'ll show up here.</div>';
        return;
      }

      const rows = entries.map(e => {
        const time = new Date(e.time);
        const timeStr = time.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        const label = e.color === 'pink' ? 'Girl' : 'Boy';
        return `<tr><td>${escapeHtml(e.name)}</td><td><span class="tag ${e.color}">${label}</span></td><td>${timeStr}</td></tr>`;
      }).join('');

      tableWrap.innerHTML = `<table>
        <thead><tr><th>Name</th><th>Guess</th><th>When</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    } catch (e) {
      tableWrap.innerHTML = '<div class="empty">Couldn\'t load results. Try refreshing.</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  load();
</script>
</body>
</html>
